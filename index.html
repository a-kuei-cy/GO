<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圍棋人機對戰排名賽</title>
    <style>
        /* --- 網頁美化 CSS --- */
        :root {
            --primary-color: #4facfe;
            --secondary-color: #00f2fe;
            --text-color: #333;
            --bg-color: #f5f7fa;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body { 
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; 
            background-image: linear-gradient(135deg, var(--bg-color) 0%, #c3cfe2 100%);
            color: var(--text-color); 
            margin: 0; 
            padding: 40px 20px; 
            min-height: 100vh;
        }

        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            backdrop-filter: blur(10px);
        }

        h1, h2 { text-align: center; color: #2c3e50; margin-bottom: 25px;}
        h3 { color: #34495e; border-bottom: 2px solid #eee; padding-bottom: 10px;}
        
        .section { display: none; opacity: 0; transition: opacity 0.4s ease-in-out; }
        .section.active { display: block; opacity: 1; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input[type="text"], input[type="password"] { 
            width: 100%; padding: 12px; box-sizing: border-box; 
            border: 2px solid #e0e0e0; border-radius: 8px; 
            font-size: 16px; transition: border-color 0.3s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--primary-color); outline: none;
        }

        button { 
            background-image: linear-gradient(to right, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white; padding: 12px 20px; border: none; border-radius: 8px; 
            cursor: pointer; font-size: 16px; font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s; width: 100%;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        button:disabled { background-image: none; background-color: #bdc3c7; cursor: not-allowed; transform: none; box-shadow: none;}
        
        .nav-buttons { display: flex; gap: 10px; margin-bottom: 30px; }
        .nav-buttons button { background-image: linear-gradient(to right, #606c88 0%, #3f4c6b 100%); font-size: 14px;}

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        th { background-color: var(--primary-color); color: white; font-weight: 600; }
        tr:hover { background-color: #f9f9f9; }

        .game-board-placeholder { 
            height: 300px; background: #e0b06b url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            border: 4px solid #5c3a21; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;
        }

        .alert-text { color: #e74c3c; font-size: 14px; margin-top: -10px; margin-bottom: 15px; display: none; }
        .admin-panel-grid { display: grid; gap: 20px; margin-bottom: 30px;}
        .danger-btn { background-image: linear-gradient(to right, #ff416c 0%, #ff4b2b 100%); }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-buttons">
        <button onclick="showSection('login-section')">🏠 首頁登錄</button>
        <button onclick="showLeaderboard()">🏆 排行榜</button>
        <button onclick="showSection('admin-login-section')">⚙️ 管理員</button>
    </div>

    <div id="login-section" class="section active">
        <h1>圍棋人機對戰</h1>
        <div class="form-group">
            <label for="className">班級</label>
            <input type="text" id="className" placeholder="例如：三年二班">
        </div>
        <div class="form-group">
            <label for="playerName">姓名</label>
            <input type="text" id="playerName" placeholder="請輸入姓名">
        </div>
        <button onclick="startGame()">開始對戰</button>
    </div>

    <div id="game-section" class="section">
        <h2>對戰進行中...</h2>
        <p style="text-align: center; font-weight: bold;">玩家：<span id="display-name" style="color:var(--primary-color);"></span> | 班級：<span id="display-class"></span></p>
        
        <div class="game-board-placeholder">
            <h3 style="color: #3e2723; border: none;">(此處放置圍棋介面)</h3>
        </div>

        <button id="submit-btn" onclick="simulateGameOver()">結束並送出成績</button>
    </div>

    <div id="leaderboard-section" class="section">
        <h2>🏆 榮譽排行榜 (前10名) 🏆</h2>
        <table>
            <thead><tr><th>排名</th><th>班級</th><th>姓名</th><th>得分</th></tr></thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
    </div>

    <div id="admin-login-section" class="section">
        <h2>管理員登入</h2>
        <div class="form-group">
            <input type="password" id="admin-pwd" placeholder="請輸入管理員密碼">
            <div id="login-error" class="alert-text">密碼錯誤，請重試！</div>
        </div>
        <button id="login-btn" onclick="checkAdmin()">登入</button>
        <p style="font-size: 12px; color: #7f8c8d; text-align: center; margin-top: 20px;">
            首次登入預設密碼為 admin123，請於登入後修改。
        </p>
    </div>

    <div id="admin-section" class="section">
        <h2>管理員控制台</h2>
        
        <div class="admin-panel-grid">
            <div style="background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #eee;">
                <h3>修改管理員密碼</h3>
                <div class="form-group">
                    <input type="password" id="old-pwd" placeholder="請輸入原密碼" style="margin-bottom: 10px;">
                    <input type="password" id="new-pwd" placeholder="請輸入新密碼" style="margin-bottom: 10px;">
                    <input type="password" id="confirm-pwd" placeholder="再次確認新密碼">
                </div>
                <button id="change-pwd-btn" class="danger-btn" onclick="changePassword()">更新密碼</button>
            </div>

            <div style="background: #e8f8f5; padding: 20px; border-radius: 8px; border: 1px solid #d1f2eb; text-align: center;">
                <h3>資料管理</h3>
                <p style="color: #16a085; font-size: 14px; margin-bottom: 15px;">要刪除紀錄或匯出 CSV，請直接前往試算表操作。</p>
                <a href="https://docs.google.com/spreadsheets/" target="_blank" style="text-decoration: none;">
                    <button style="background-image: linear-gradient(to right, #11998e 0%, #38ef7d 100%);">📊 打開 Google 試算表</button>
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // !!! 請將這裡替換成你剛剛「重新部署」後的網址 !!!
    // ==========================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz280uOXdBbSHjPVtqvysgBG6HkHuYjgMyTozXdID57p53bCizKde6ZsRAUR1ZjXPnD/exec'; 

    let currentPlayer = { className: "", name: "" };

    // === UI 切換邏輯 ===
    function showSection(sectionId) {
        document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
        // 稍微延遲加入 active 以觸發 CSS 過渡動畫
        setTimeout(() => {
            document.getElementById(sectionId).classList.add('active');
        }, 50);
        document.getElementById('login-error').style.display = 'none'; // 重置錯誤提示
    }

    // === 1. 開始遊戲邏輯 ===
    function startGame() {
        const className = document.getElementById('className').value.trim();
        const name = document.getElementById('playerName').value.trim();
        if (!className || !name) return alert("請填寫班級和姓名喔！");
        currentPlayer.className = className;
        currentPlayer.name = name;
        document.getElementById('display-class').innerText = className;
        document.getElementById('display-name').innerText = name;
        showSection('game-section');
    }

    // === 2. 儲存成績邏輯 ===
    function simulateGameOver() {
        const score = Math.floor(Math.random() * 100) + 1; 
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true; 
        submitBtn.innerText = "資料上傳中...";

        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'submit_score', className: currentPlayer.className, name: currentPlayer.name, score: score })
        })
        .then(res => res.json())
        .then(result => {
            if(result.status === "success") {
                alert(`對戰結束！得分：${score} \n成績已成功上傳雲端！`);
                showLeaderboard();
            }
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = "結束並送出成績";
        });
    }

    // === 3. 讀取排行榜 ===
    function showLeaderboard() {
        showSection('leaderboard-section');
        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = "<tr><td colspan='4'>成績載入中，請稍候...</td></tr>";

        fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
            data.sort((a, b) => b.score - a.score);
            const top10 = data.slice(0, 10);
            tbody.innerHTML = top10.length === 0 ? "<tr><td colspan='4'>目前還沒有成績喔！</td></tr>" : "";
            top10.forEach((row, index) => {
                let medal = index === 0 ? '🥇 ' : index === 1 ? '🥈 ' : index === 2 ? '🥉 ' : '';
                tbody.innerHTML += `<tr><td>${medal}${index + 1}</td><td>${row.className}</td><td>${row.name}</td><td><b>${row.score}</b></td></tr>`;
            });
        });
    }

    // === 4. 管理員登入 (連線後端驗證) ===
    function checkAdmin() {
        const pwdInput = document.getElementById('admin-pwd');
        const pwd = pwdInput.value;
        const btn = document.getElementById('login-btn');
        
        if(!pwd) return;

        btn.disabled = true;
        btn.innerText = "驗證中...";
        document.getElementById('login-error').style.display = 'none';

        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'verify_admin', password: pwd })
        })
        .then(res => res.json())
        .then(result => {
            if(result.status === "success") {
                pwdInput.value = '';
                showSection('admin-section');
            } else {
                document.getElementById('login-error').style.display = 'block';
                pwdInput.value = '';
            }
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "登入";
        });
    }

    // === 5. 修改密碼 ===
    function changePassword() {
        const oldPwd = document.getElementById('old-pwd').value;
        const newPwd = document.getElementById('new-pwd').value;
        const confirmPwd = document.getElementById('confirm-pwd').value;
        const btn = document.getElementById('change-pwd-btn');

        if (!oldPwd || !newPwd || !confirmPwd) return alert("所有欄位都必須填寫！");
        if (newPwd !== confirmPwd) return alert("新密碼與確認密碼不一致！");

        btn.disabled = true;
        btn.innerText = "更新中...";

        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'change_password', oldPassword: oldPwd, newPassword: newPwd })
        })
        .then(res => res.json())
        .then(result => {
            if(result.status === "success") {
                alert("密碼修改成功！下次請使用新密碼登入。");
                document.getElementById('old-pwd').value = '';
                document.getElementById('new-pwd').value = '';
                document.getElementById('confirm-pwd').value = '';
            } else {
                alert("修改失敗：" + result.message);
            }
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "更新密碼";
        });
    }
</script>

</body>
</html>
